# FirePlank-Guard: FP-1 (boot integrity) + FP-4 (privilege reduction)
# See ACTUATOR_TCB.md
[Service]
ExecStartPre=/usr/local/bin/fireplank-guard-boot.sh
ProtectSystem=strict
ProtectHome=yes
PrivateTmp=yes
PrivateDevices=yes
ProtectKernelTunables=yes
ProtectKernelModules=yes
ProtectControlGroups=yes
RestrictAddressFamilies=AF_UNIX
RestrictNamespaces=yes
RestrictRealtime=yes
SystemCallFilter=@system-service
MemoryDenyWriteExecute=yes
ReadWritePaths=/run/slime /var/log/slime-actuator
# MiniMax audit finding H-1: drop every POSIX capability explicitly.
# The prior Copilot pass added these to the installer/ path's hardening
# drop-in but missed this deploy/ copy — closes that cross-path drift.
# The actuator needs no capabilities; with this in place a compromised
# binary cannot acquire any via execve even if NoNewPrivileges were
# relaxed.
CapabilityBoundingSet=
AmbientCapabilities=
LockPersonality=yes
