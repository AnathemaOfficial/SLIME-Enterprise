# FP-4: FirePlank-Guard privilege reduction (ACTUATOR_TCB.md)
[Service]
ProtectSystem=strict
ProtectHome=yes
PrivateTmp=yes
PrivateDevices=yes
ProtectKernelTunables=yes
ProtectKernelModules=yes
ProtectControlGroups=yes
RestrictAddressFamilies=AF_UNIX AF_INET
RestrictNamespaces=yes
RestrictRealtime=yes
SystemCallFilter=@system-service
MemoryDenyWriteExecute=yes
ReadWritePaths=/run/slime
# Copilot audit finding H-3: drop all capabilities. The runner writes
# 32-byte frames to the egress socket and needs no elevated privilege.
CapabilityBoundingSet=
AmbientCapabilities=
LockPersonality=yes
