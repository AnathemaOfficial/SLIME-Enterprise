# FirePlank-Guard: FP-1 (boot integrity) + FP-4 (privilege reduction)
# See ACTUATOR_TCB.md
[Service]
ExecStartPre=/usr/local/bin/fireplank-guard-boot.sh
ProtectSystem=strict
ProtectHome=yes
PrivateTmp=yes
PrivateDevices=yes
ProtectKernelTunables=yes
ProtectKernelModules=yes
ProtectControlGroups=yes
RestrictAddressFamilies=AF_UNIX
RestrictNamespaces=yes
RestrictRealtime=yes
SystemCallFilter=@system-service
MemoryDenyWriteExecute=yes
ReadWritePaths=/run/slime /var/log/slime-actuator
# Copilot audit finding H-3: explicitly drop all POSIX capabilities.
# The actuator needs none — it only binds a pre-created runtime dir,
# reads fixed 32-byte frames from a Unix socket, and appends to a log.
# With an empty bounding set a compromised binary cannot acquire
# CAP_NET_RAW / CAP_SYS_PTRACE / CAP_DAC_OVERRIDE even if it manages
# its own execve.
CapabilityBoundingSet=
AmbientCapabilities=
LockPersonality=yes
