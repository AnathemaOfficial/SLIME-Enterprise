name: CI — SLIME Enterprise

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-checks:
    name: Rust (actuator-min)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --manifest-path actuator-min/Cargo.toml
      - run: cargo clippy --manifest-path actuator-min/Cargo.toml -- -D warnings
      - run: cargo install cargo-audit --locked
      - run: cargo audit --file actuator-min/Cargo.lock

  python-lint:
    name: Python (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      # Skip B404 (import subprocess) — intentional for systemctl queries.
      # Skip B310 (urllib urlopen) — used for local Ollama API only, URL from env var.
      # Fail only on MEDIUM+ severity to avoid blocking on informational LOW findings.
      - run: bandit -r dashboard installer deploy -f txt --skip B404,B310 -ll

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y shellcheck
      # Exclude SC1090 (non-constant source) and SC2034 (unused variable)
      # which are false positives in adversarial test scripts.
      - run: shellcheck -e SC1090,SC2034 deploy/*.sh installer/*.sh adversarial/phase4/*.sh
